---
title: {{ page.title }}
---

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include head.html %}
  <link rel="stylesheet" href={{ "/blog/assets/styles/post.css" | relative_url }}>
  <link rel="stylesheet" href={{ "/blog/assets/styles/syntax-highlight.css" | relative_url }}>
  <script type="text/javascript" async
    src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.1/MathJax.js?config=TeX-AMS_CHTML">
  </script>
</head>
<body>
  {% include nav.html %}

  <div class="container content">
    <div class="post-header">
      <h1 class="post-title">{{ page.title }}</h1>
      <div class="post-meta">
        <div class="post-date">{{ page.date | date_to_string }}</div>
        <div class="post-tags">
          {% for tag in page.tags %}
          <a href="{{ site.baseurl }}/blog/allposts/#{{ tag }}">{{ tag }}</a>
          {% endfor %}
        </div>
      </div>
    </div><!-- post-header -->

    <div class="post-body">
      <div class="post-content">
        {{ content }}
      </div>
      {% include post-turn.html %}

      {% if page.comments %}
      {% include disqus_comment.html %}
      {% endif %}
    </div><!-- post-body -->

    <div class="post-tip">
      <div id="toc">
      </div>
      <button type="button" class="sm" id="back-to-top">
        回到顶部
      </button>
    </div>
  </div><!-- container -->

  <script type="module" src={{ "/blog/assets/scripts/post.js" | relative_url }}></script>
</body>
</html>
